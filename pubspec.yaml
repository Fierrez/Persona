name: persona_app
description: "Personal Security & Productivity App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_secure_storage: ^10.0.0
  uuid: ^4.5.1
  otp: ^3.1.5
  base32: ^2.1.3
  mobile_scanner: ^7.2.0
  csv: ^6.0.0
  path_provider: ^2.1.4
  intl: ^0.20.2
  share_plus: ^12.0.1
  file_picker: ^10.3.10
  google_fonts: ^8.0.2
  provider: ^6.1.2
  local_auth: ^3.0.1
  encrypt: ^5.0.3
  crypto: ^3.0.3
  screen_protector: ^1.1.0
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.0
  flutter_markdown: ^0.7.3
  introduction_screen: ^4.0.0
  animations: ^2.0.11
  font_awesome_flutter: ^10.7.0
  table_calendar: ^3.1.2
  image_picker: ^1.1.2
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/persona_icon1.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
